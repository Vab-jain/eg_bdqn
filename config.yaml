env:
  env_name: "BabyAI-GoToDoor-v0"

seed: 42

budget:
  B_total: 1000
  top_x_percent: 10
  u_buffer_size: 1000
  epsilon: 1.0e-6

training:
  total_steps: 100000
  batch_size: 64
  buffer_size: 50000
  gamma: 0.99
  target_update_freq: 1000
  learning_rate: 0.0003
  train_start: 1000

bdqn:
  num_heads: 10
  bootstrap_mask_prob: 0.5  # 1.0 = no masking, 0.5 = Bernoulli masking per head

exploration:
  eps_start: 1.0
  eps_end: 0.05
  eps_decay_steps: 30000

# Mode: "eg_bdqn" | "dqn" | "random_gating" | "random_oracle"
mode: "eg_bdqn"

logging:
  log_dir: "logs"
  checkpoint_freq: 10000
  log_freq: 100
